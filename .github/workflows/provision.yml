name: 👑 Provision Princess (Linode)

# Idempotent provisioning, in the order that matters:
#   1. Linode API: does a server labelled "princess" exist? yes → report, done.
#   2. No → create it (root_pass = ROOT_PASSWORD secret, so you always have
#      Lish/console access), wait for it to boot.
#   3. Root SSH via a RUN-EPHEMERAL keypair (generated on this runner, injected
#      at create, removed from the server at the end — no pre-existing SSH
#      secrets required).
#   4. Wait out cloud-init (system update, users, docker, ufw, tailscale
#      install), then join the tailnet (OAuth client secret as auth key) and
#      GENERATE THE PERMANENT SSH KEYPAIRS ON THE SERVER (root + actions).
#   5. You then log in and copy the two private keys into the GitHub secrets:
#        ROOT_SSH_KEY ← /root/.ssh/id_ed25519
#        SSH_KEY      ← /home/actions/.ssh/id_ed25519
#      (Private keys are never printed to workflow logs — this repo is public.)
#
# The deploy workflow discovers princess's tailscale IP from the tailnet, so
# PRINCESS_TAILSCALE_IP is only an optional override.

on:
    workflow_dispatch:
        inputs:
            confirm:
                description: 'Type "princess" to confirm creating a billable Linode instance'
                required: true
            instance_type:
                description: Linode instance type
                default: g6-nanode-1
            region:
                description: Linode region
                default: ca-central
            image:
                description: Linode image
                default: linode/ubuntu26.04
            tailscale_tag:
                description: Tag for the tailnet node (must be grantable by the OAuth client)
                default: "tag:ci"
            advertise_exit_node:
                description: Advertise princess as a Tailscale exit node
                type: boolean
                default: true

permissions:
    contents: read

env:
    INSTANCE_LABEL: princess

jobs:
    provision:
        name: 🏗️ Provision Linode
        runs-on: ubuntu-latest
        if: inputs.confirm == 'princess'
        steps:
            - name: 📥 Checkout
              uses: actions/checkout@v4

            # ── 1. Linode first: anything already running? ──────────────────
            - name: 🔎 Check for existing instance
              id: existing
              env:
                  LINODE_API_KEY: ${{ secrets.LINODE_API_KEY }}
              run: |
                  RESP=$(curl -sf -H "Authorization: Bearer $LINODE_API_KEY" \
                    "https://api.linode.com/v4/linode/instances")
                  IP=$(echo "$RESP" | jq -r --arg l "$INSTANCE_LABEL" \
                    '.data[] | select(.label == $l) | .ipv4[0] // empty')
                  if [ -n "$IP" ]; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                    echo "public_ip=$IP" >> "$GITHUB_OUTPUT"
                    echo "::notice::Linode '$INSTANCE_LABEL' already exists at $IP — nothing to create"
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: 🧪 Preflight secrets
              if: steps.existing.outputs.exists == 'false'
              env:
                  ROOT_PASSWORD: ${{ secrets.ROOT_PASSWORD }}
                  TS_SECRET: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
              run: |
                  if [ -z "$ROOT_PASSWORD" ]; then
                    echo "::error::ROOT_PASSWORD secret is empty — set a strong root password (used for the Linode create; gives you Lish console access)"
                    exit 1
                  fi
                  if [ ${#ROOT_PASSWORD} -lt 12 ]; then
                    echo "::error::ROOT_PASSWORD is too short — Linode enforces a strength check; use 12+ mixed characters"
                    exit 1
                  fi
                  if [ -z "$TS_SECRET" ]; then
                    echo "::error::TAILSCALE_OAUTH_SECRET secret is empty — needed to join the tailnet"
                    exit 1
                  fi

            # ── 2/3. Create with an ephemeral root key for this run only ────
            - name: 🔑 Generate run-ephemeral root key
              id: ephemeral
              if: steps.existing.outputs.exists == 'false'
              run: |
                  umask 077
                  ssh-keygen -t ed25519 -N "" -C "princess-provision-ephemeral" -f /tmp/ephemeral_key >/dev/null
                  echo "pub=$(cat /tmp/ephemeral_key.pub)" >> "$GITHUB_OUTPUT"

            - name: 🏗️ Create Linode instance
              id: create
              if: steps.existing.outputs.exists == 'false'
              env:
                  LINODE_API_KEY: ${{ secrets.LINODE_API_KEY }}
                  ROOT_PASSWORD: ${{ secrets.ROOT_PASSWORD }}
              run: |
                  BODY=$(jq -n \
                    --arg label "$INSTANCE_LABEL" \
                    --arg region "${{ inputs.region }}" \
                    --arg type "${{ inputs.instance_type }}" \
                    --arg image "${{ inputs.image }}" \
                    --arg root_pass "$ROOT_PASSWORD" \
                    --arg key "${{ steps.ephemeral.outputs.pub }}" \
                    --arg user_data "$(base64 -w0 provision/cloud-init.yaml)" \
                    '{label: $label, region: $region, type: $type, image: $image,
                      root_pass: $root_pass, authorized_keys: [$key], booted: true,
                      tags: ["princess", "edge"],
                      metadata: {user_data: $user_data}}')
                  RESP=$(curl -sf -X POST "https://api.linode.com/v4/linode/instances" \
                    -H "Authorization: Bearer $LINODE_API_KEY" \
                    -H "Content-Type: application/json" \
                    --data "$BODY") || { echo "::error::Linode create failed (check LINODE_API_KEY and ROOT_PASSWORD strength)"; exit 1; }
                  echo "id=$(echo "$RESP" | jq -r .id)" >> "$GITHUB_OUTPUT"
                  echo "public_ip=$(echo "$RESP" | jq -r '.ipv4[0]')" >> "$GITHUB_OUTPUT"

            - name: ⏳ Wait for instance to boot
              if: steps.existing.outputs.exists == 'false'
              env:
                  LINODE_API_KEY: ${{ secrets.LINODE_API_KEY }}
              run: |
                  for i in $(seq 1 40); do
                    STATUS=$(curl -sf -H "Authorization: Bearer $LINODE_API_KEY" \
                      "https://api.linode.com/v4/linode/instances/${{ steps.create.outputs.id }}" | jq -r .status)
                    echo "status: $STATUS (attempt $i)"
                    [ "$STATUS" = "running" ] && exit 0
                    sleep 15
                  done
                  echo "::error::instance did not reach 'running' in 10 minutes"; exit 1

            # ── 4. SSH in as root, wait out cloud-init ──────────────────────
            - name: ⏳ Wait for cloud-init to finish
              if: steps.existing.outputs.exists == 'false'
              run: |
                  IP="${{ steps.create.outputs.public_ip }}"
                  # Exit 0 = done clean; exit 2 = done DEGRADED (recoverable
                  # warnings — e.g. Linode's metadata service logs an IPv6
                  # retry warning on every boot). Both mean "finished".
                  for i in $(seq 1 30); do
                    if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i /tmp/ephemeral_key \
                        root@"$IP" "cloud-init status --wait >/dev/null 2>&1; rc=\$?; [ \$rc -eq 0 ] || [ \$rc -eq 2 ]" 2>/dev/null; then
                      echo "✅ cloud-init complete"
                      exit 0
                    fi
                    echo "waiting for SSH... (attempt $i)"
                    sleep 20
                  done
                  echo "::error::could not reach the server / cloud-init did not finish — check Lish console"
                  exit 1

            - name: 🔗 Join Tailscale + generate server-side SSH keys
              id: bootstrap
              # Runs for a FRESH instance (ephemeral key) or an EXISTING one
              # (ROOT_SSH_KEY secret) — so a run that died halfway, or a
              # manually-created server, can always be completed by re-running.
              if: steps.create.outcome == 'success' || steps.existing.outputs.exists == 'true'
              env:
                  TS_OAUTH_SECRET: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
                  ROOT_SSH_KEY: ${{ secrets.ROOT_SSH_KEY }}
              run: |
                  umask 077
                  if [ "${{ steps.existing.outputs.exists }}" = "true" ]; then
                    IP="${{ steps.existing.outputs.public_ip }}"
                    echo "$ROOT_SSH_KEY" > /tmp/boot_key
                    if ! ssh-keygen -y -f /tmp/boot_key >/dev/null 2>&1; then
                      echo "::error::Instance exists but ROOT_SSH_KEY secret is not a valid private key — cannot finish its bootstrap. Set it (ssh root@$IP 'cat /root/.ssh/id_ed25519' | gh secret set ROOT_SSH_KEY -R ${{ github.repository }}) or delete the Linode and re-run."
                      exit 1
                    fi
                  else
                    IP="${{ steps.create.outputs.public_ip }}"
                    cp /tmp/ephemeral_key /tmp/boot_key
                  fi

                  SSH="ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i /tmp/boot_key root@$IP"

                  EXIT_FLAG=""
                  if [ "${{ inputs.advertise_exit_node }}" = "true" ]; then
                    EXIT_FLAG="--advertise-exit-node"
                  fi

                  # Join the tailnet (skipped if already joined): OAuth client
                  # secret used directly as an auth key (tailscale.com/kb/1215)
                  # — node is tag-owned (no key expiry), non-ephemeral,
                  # preauthorized.
                  TS_IP=$($SSH "tailscale ip -4 2>/dev/null | head -1") || true
                  if [ -n "$TS_IP" ]; then
                    echo "already on the tailnet as $TS_IP — skipping join"
                  else
                    $SSH \
                      "tailscale up \
                         --auth-key='${TS_OAUTH_SECRET}?ephemeral=false&preauthorized=true' \
                         --advertise-tags='${{ inputs.tailscale_tag }}' \
                         --hostname=princess \
                         --accept-routes $EXIT_FLAG"
                  fi

                  # Generate the PERMANENT keypairs ON the server if missing
                  # (they never appear in these logs); enable them for their
                  # users. Idempotent.
                  $SSH 'bash -s' <<'EOSH'
                  set -e
                  [ -f /root/.ssh/id_ed25519 ] || ssh-keygen -t ed25519 -N "" -C "princess-root" -f /root/.ssh/id_ed25519 >/dev/null
                  grep -qf /root/.ssh/id_ed25519.pub /root/.ssh/authorized_keys 2>/dev/null || cat /root/.ssh/id_ed25519.pub >> /root/.ssh/authorized_keys
                  chmod 600 /root/.ssh/authorized_keys

                  install -d -m 700 -o actions -g actions /home/actions/.ssh
                  [ -f /home/actions/.ssh/id_ed25519 ] || ssh-keygen -t ed25519 -N "" -C "princess-actions" -f /home/actions/.ssh/id_ed25519 >/dev/null
                  grep -qf /home/actions/.ssh/id_ed25519.pub /home/actions/.ssh/authorized_keys 2>/dev/null || cat /home/actions/.ssh/id_ed25519.pub >> /home/actions/.ssh/authorized_keys
                  chown -R actions:actions /home/actions/.ssh
                  chmod 600 /home/actions/.ssh/id_ed25519 /home/actions/.ssh/authorized_keys
                  echo "server-side keys ready"
                  EOSH

                  TS_IP=$($SSH "tailscale ip -4 | head -1")
                  if [ -z "$TS_IP" ]; then
                    echo "::error::tailscale join appeared to succeed but no IPv4 was assigned"
                    exit 1
                  fi
                  echo "ts_ip=$TS_IP" >> "$GITHUB_OUTPUT"
                  echo "::notice::princess is on the tailnet as $TS_IP"

                  # Last act: revoke any provision-ephemeral key from the server.
                  $SSH "sed -i '/princess-provision-ephemeral/d' /root/.ssh/authorized_keys"

            - name: 🧹 Cleanup runner key material
              if: always()
              run: rm -f /tmp/ephemeral_key /tmp/ephemeral_key.pub /tmp/boot_key

            - name: 📋 Summary
              if: always()
              run: |
                  IP="${{ steps.existing.outputs.public_ip || steps.create.outputs.public_ip }}"
                  TS_IP="${{ steps.bootstrap.outputs.ts_ip }}"
                  {
                    echo "## 👑 Princess provisioning"
                    echo ""
                    echo "| | |"
                    echo "|---|---|"
                    echo "| Public IP | \`$IP\` (SSH only — nothing else binds here) |"
                    echo "| Tailscale IP | \`${TS_IP:-n/a (existing instance or join failed)}\` |"
                    echo "| Region | ${{ inputs.region }} |"
                    echo "| Type | ${{ inputs.instance_type }} (\$5/mo) |"
                    echo "| Image | ${{ inputs.image }} |"
                    echo ""
                    echo "### Fetch the two generated secrets (from your desktop)"
                    echo '```bash'
                    echo "ssh root@$IP 'cat /root/.ssh/id_ed25519' | gh secret set ROOT_SSH_KEY -R ${{ github.repository }}"
                    echo "ssh root@$IP 'cat /home/actions/.ssh/id_ed25519' | gh secret set SSH_KEY -R ${{ github.repository }}"
                    echo '```'
                    echo "(root SSH works with your desktop key; Lish + ROOT_PASSWORD is the backup path)"
                    echo ""
                    echo "### Then"
                    if [ "${{ inputs.advertise_exit_node }}" = "true" ]; then
                      echo "- Approve the **exit node** in the Tailscale admin console (Machines → princess → Edit route settings)"
                    fi
                    echo "- Run the **👑 Princess Deploy** workflow (or push to main) — it finds princess on the tailnet by itself"
                    echo "- Optional: \`PRINCESS_TAILSCALE_IP=${TS_IP:-<ip>}\` as an override secret; optional hardening: \`ufw delete allow 22/tcp\` on the server"
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: 📣 Notify
              if: always()
              uses: nuniesmith/actions/.github/actions/discord-notify@main
              continue-on-error: true
              with:
                  webhook-url: ${{ secrets.DISCORD_WEBHOOK_ACTIONS }}
                  title: "👑 Princess Provisioning"
                  description: "Linode edge server provisioning"
                  status: ${{ job.status == 'success' && 'success' || 'failure' }}
                  include-repo-info: true
                  fields: |
                      [
                        {"name": "Public IP", "value": "${{ steps.existing.outputs.public_ip || steps.create.outputs.public_ip || 'n/a' }}", "inline": true},
                        {"name": "Tailscale IP", "value": "${{ steps.bootstrap.outputs.ts_ip || 'n/a' }}", "inline": true},
                        {"name": "Existed", "value": "${{ steps.existing.outputs.exists }}", "inline": true}
                      ]
