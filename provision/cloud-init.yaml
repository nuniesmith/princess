#cloud-config
# princess bootstrap — mirrors freddy/sullivan's setup-prod-server.sh, adapted
# for a public Linode. Rendered by .github/workflows/provision.yml, which
# replaces __ACTIONS_PUBKEY__ with the public key derived from the SSH_KEY
# secret. Linode requires this base64-encoded in metadata.user_data (max 64KB)
# and it CANNOT be changed after create — keep this bootstrap-only; everything
# else deploys via GitHub Actions over SSH.

package_update: true
package_upgrade: true

# The provision workflow SSHes as root (key injected via the Linode API) to
# watch cloud-init and run the tailscale join — don't let cloud-init's Ubuntu
# default (disable_root: true) break that.
disable_root: false
ssh_pwauth: false

packages:
  - curl
  - ca-certificates
  - ufw
  - fail2ban
  - git

users:
  # CI/CD user (SSH-key-only; added to docker group in runcmd once docker exists)
  - name: actions
    gecos: GitHub Actions CI/CD User
    shell: /bin/bash
    lock_passwd: true
    ssh_authorized_keys:
      - __ACTIONS_PUBKEY__
  # Interactive admin user
  - name: jordan
    gecos: Jordan
    shell: /bin/bash
    lock_passwd: true
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIISPnlFyF55VSInQ2MTULrBgwwKrSJfIpqiU9y9jtgTb jordan@desktop

write_files:
  # Same hardening directives as freddy's drop-in. Named 00- (not 99-) because
  # sshd honours the FIRST occurrence of each keyword across sshd_config.d and
  # Ubuntu ships 60-cloudimg-settings.conf with PasswordAuthentication yes —
  # this file must sort before it to win.
  - path: /etc/ssh/sshd_config.d/00-princess-hardening.conf
    permissions: "0644"
    content: |
      # Princess Server SSH Hardening
      PermitRootLogin prohibit-password
      PasswordAuthentication no
      ChallengeResponseAuthentication no
      UsePAM yes
      PermitEmptyPasswords no
      MaxAuthTries 3
      MaxSessions 5
      LoginGraceTime 30
      X11Forwarding no
      Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr
      MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256
      KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512
      LogLevel VERBOSE
      ClientAliveInterval 300
      ClientAliveCountMax 2
      AllowUsers actions jordan root

  # Docker daemon hardening (same as freddy)
  - path: /etc/docker/daemon.json
    permissions: "0644"
    content: |
      {
          "log-driver": "json-file",
          "log-opts": {
              "max-size": "10m",
              "max-file": "3"
          },
          "live-restore": true,
          "userland-proxy": false,
          "no-new-privileges": true,
          "storage-driver": "overlay2"
      }

  - path: /etc/fail2ban/jail.local
    permissions: "0644"
    content: |
      [sshd]
      enabled = true
      # journald, not /var/log/auth.log — minimal cloud images ship no rsyslog
      backend = systemd
      maxretry = 5
      bantime = 3600
      findtime = 600

  # Order docker after tailscaled so the nginx container's BIND_IP (the
  # tailscale 100.x address) exists at daemon-boot container restore. The wait
  # is best-effort (always exits 0) — ip_nonlocal_bind below is the hard
  # guarantee that the bind succeeds regardless.
  - path: /etc/systemd/system/docker.service.d/wait-tailscale.conf
    permissions: "0644"
    content: |
      [Unit]
      After=tailscaled.service
      Wants=tailscaled.service

      [Service]
      ExecStartPre=/bin/sh -c 'for i in $(seq 1 30); do tailscale ip -4 >/dev/null 2>&1 && exit 0; sleep 2; done; exit 0'

runcmd:
  # Docker CE (official convenience script uses the same download.docker.com repo)
  - curl -fsSL https://get.docker.com | sh
  - usermod -aG docker actions
  - systemctl enable --now docker
  # Firewall: TAILNET-ONLY model — no public 80/443. nginx binds to the
  # tailscale IP (BIND_IP in .env), because Docker-published ports bypass UFW;
  # the bind address, not the firewall, is what keeps the public IP dark.
  # 22 stays open (key-only + fail2ban) as the bootstrap/rescue path; close it
  # after the tailnet join if you want (docs/PROVISIONING.md §5).
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow in on tailscale0
  - ufw --force enable
  - systemctl enable --now fail2ban
  # Tailscale — installed but NOT joined (manual `tailscale up`, same as
  # freddy/sullivan; the OAuth secrets are only for ephemeral CI runners)
  - curl -fsSL https://tailscale.com/install.sh | sh
  # IP forwarding for exit-node duty + nonlocal bind so docker can publish
  # ports on the tailscale IP even before tailscale0 is up (reboot race)
  - printf 'net.ipv4.ip_forward = 1\nnet.ipv6.conf.all.forwarding = 1\nnet.ipv4.ip_nonlocal_bind = 1\n' > /etc/sysctl.d/99-tailscale.conf
  - sysctl -p /etc/sysctl.d/99-tailscale.conf
  - systemctl daemon-reload
  - systemctl restart ssh
  - touch /var/lib/cloud/princess-bootstrap-done

final_message: "princess bootstrap complete after $UPTIME seconds"
