# Services hosted on FREDDY, proxied over Tailscale.
# Block structure mirrors freddy's edge config; upstreams now cross the
# tailnet instead of the local docker host gateway.

# Authentik - SSO / Identity Provider
# NOTE: auth.7gram.xyz must keep working — sullivan's (documented) forward-auth
# pattern redirects to https://auth.7gram.xyz/outpost.goauthentik.io/start.
server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name auth.7gram.xyz;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        set $upstream_authentik $freddy_authentik_upstream;
        proxy_pass http://$upstream_authentik;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
        client_max_body_size 50M;
    }
}

