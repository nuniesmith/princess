# Services hosted on SULLIVAN, proxied over Tailscale.
# Mirrors freddy's 20-sullivan-services.conf (same server blocks and
# per-service tweaks), with two upstream port fixes noted in nginx.conf
# (jellyfin 8920→8097, wiki 3000→8090).

# Emby - Media Server
server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name emby.7gram.xyz;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        set $upstream_emby $sullivan_emby_upstream;
        proxy_pass http://$upstream_emby;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Streaming: no buffering, long-lived connections
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

