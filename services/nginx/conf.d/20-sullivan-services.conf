    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name qbt.7gram.xyz;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        set $upstream_qbittorrent $sullivan_qbittorrent_upstream;
        proxy_pass http://$upstream_qbittorrent;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # qBittorrent WebUI requires stripped Referer/Origin behind a proxy
        proxy_set_header Referer "";
        proxy_set_header Origin "";

        proxy_read_timeout 300s;
    }
}

# Calibre - E-book Management. Port 8083 = the Calibre CONTENT SERVER web UI
# (sullivan publishes "8083:8081"), same target freddy's edge used. The KasmVNC
# web desktop is host port 8082 — switch the map in nginx.conf if you want
# that instead. WebSocket headers are kept (harmless for the content server).
server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name calibre.7gram.xyz;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 500M;

    location / {
        set $upstream_calibre $sullivan_calibre_upstream;
        proxy_pass http://$upstream_calibre;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (KasmVNC web desktop)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400s;
    }
}

