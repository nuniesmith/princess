# Default servers: HTTP->HTTPS redirect, dashboard, health, catch-all.
# Mirrors freddy's 00-default.conf.

# HTTP server - redirect all traffic to HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ACME webroot (unused while certs come via DNS-01, kept for flexibility)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS dashboard at the root domain
server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name 7gram.xyz www.7gram.xyz princess.7gram.xyz;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    root /dashboard;
    index index.html;

    location / {
        limit_req zone=general burst=20 nodelay;
        try_files $uri $uri/ /index.html;
    }

    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 100.64.0.0/10;  # Tailscale CGNAT range
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }
}

# Catch-all DEFAULT server for unknown hosts - return 444 (drop connection).
# Deliberate change from freddy: there the dashboard block held default_server,
# which silently swallowed unknown-host requests; on a public edge, IP scanners
# and random Host headers should get nothing.
server {
    listen 443 ssl default_server;
    http2 on;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    return 444;
}
