# princess — edge nginx for 7gram.xyz
#
# Pattern carried over from freddy's edge: every upstream is a `map` variable
# and every proxy_pass uses `set $upstream_x ...; proxy_pass http://$upstream_x;`
# so nginx starts even when a backend is down (runtime resolution instead of
# startup-time upstream checks). Requires the `resolver` directive below.
#
# On princess ALL upstreams are reached over the Tailscale network:
#   freddy   = 100.106.65.55  (host-published service ports)
#   sullivan = 100.87.125.19  (host-published service ports)
# The entrypoint (/docker-entrypoint.d/99-init.sh) rewrites these literal IPs
# from FREDDY_TAILSCALE_IP / SULLIVAN_TAILSCALE_IP env vars at container start.

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;

    # Large host/variable tables — required for the many map variables below.
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;
    server_names_hash_bucket_size 128;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss image/svg+xml;

    # TLS defaults (cert files are populated by the entrypoint from the
    # ssl-certs volume, with a baked-in self-signed fallback).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Docker's embedded DNS — the map/set/proxy_pass-variable trick needs a
    # resolver. Only valid inside Docker (as on freddy).
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # Rate limiting zones (defined on freddy too; applied per-location where
    # it makes sense on a public edge).
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ==========================================================================
    # FREDDY SERVICES (via Tailscale — host-published ports on freddy)
    # ==========================================================================
    map $host $freddy_photoprism_upstream     { default "100.106.65.55:2342"; }
    map $host $freddy_nextcloud_upstream      { default "100.106.65.55:8080"; }
    map $host $freddy_homeassistant_upstream  { default "100.106.65.55:8123"; }
    map $host $freddy_audiobookshelf_upstream { default "100.106.65.55:13378"; }
    map $host $freddy_authentik_upstream      { default "100.106.65.55:9000"; }
    map $host $freddy_uptime_kuma_upstream    { default "100.106.65.55:3001"; }

    # ==========================================================================
    # SULLIVAN SERVICES (via Tailscale — host-published ports on sullivan)
    # ==========================================================================
    map $host $sullivan_emby_upstream        { default "100.87.125.19:8096"; }
    # NOTE: freddy's edge pointed jellyfin at :8920 (emby's HTTPS port —
    # almost certainly broken). Sullivan publishes jellyfin on host port 8097
    # (sullivan docker-compose.yml: "8097:8096"). Fixed here.
    map $host $sullivan_jellyfin_upstream    { default "100.87.125.19:8097"; }
    map $host $sullivan_plex_upstream        { default "100.87.125.19:32400"; }
    map $host $sullivan_sonarr_upstream      { default "100.87.125.19:8989"; }
    map $host $sullivan_radarr_upstream      { default "100.87.125.19:7878"; }
    map $host $sullivan_lidarr_upstream      { default "100.87.125.19:8686"; }
    map $host $sullivan_prowlarr_upstream    { default "100.87.125.19:9696"; }
    map $host $sullivan_bazarr_upstream      { default "100.87.125.19:6767"; }
    map $host $sullivan_seerr_upstream       { default "100.87.125.19:5055"; }
    map $host $sullivan_tdarr_upstream       { default "100.87.125.19:8265"; }
    map $host $sullivan_qbittorrent_upstream { default "100.87.125.19:8080"; }
    map $host $sullivan_calibre_upstream     { default "100.87.125.19:8083"; }
    map $host $sullivan_ytdl_upstream        { default "100.87.125.19:8998"; }
    map $host $sullivan_filebot_upstream     { default "100.87.125.19:5452"; }
    map $host $sullivan_grocy_upstream       { default "100.87.125.19:9283"; }
    map $host $sullivan_mealie_upstream      { default "100.87.125.19:9925"; }
    # NOTE: freddy's edge pointed wiki at :3000, but sullivan publishes
    # wiki.js on host port 8090 (sullivan docker-compose.yml: "8090:3000").
    # Fixed here.
    map $host $sullivan_wiki_upstream        { default "100.87.125.19:8090"; }
    map $host $sullivan_duplicati_upstream   { default "100.87.125.19:8200"; }

    include /etc/nginx/conf.d/*.conf;
}
